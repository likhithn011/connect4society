<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Template</title>

  <style>
    :root {
      --bg: #f4f7fc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #0f766e;
      --accent: #14b8a6;
      --shadow: 0 12px 35px rgba(0,0,0,0.08);
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(to bottom, #eef3f9, var(--bg));
      color: var(--text);
      padding: 30px 15px;
    }
    .container { max-width: 1000px; margin: auto; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 16px; }
    .logo img {
      width: 55px; height: 55px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 6px;
      background: #fff;
    }
    .brand-text h1 { font-size: 24px; font-weight: 700; }
    .brand-text p { font-size: 14px; color: var(--muted); }
    .header-badge {
      background: rgba(20,184,166,0.1);
      color: var(--primary);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .certificate-area {
      padding: 30px;
      background: linear-gradient(180deg, #f9fbff, #f1f5f9);
    }
    .certificate-box {
      width: 100%;
      border-radius: 16px;
      border: 2px solid #cbd5e1;
      overflow: hidden;
      background: #fff;
    }
    .certificate-box img { width: 100%; height: auto; display: block; }
    .footer {
      text-align: center;
      padding: 14px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .certificate-area { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="brand">
          <div class="logo"><img src="certificate/logo.png" alt="Logo"></div>
          <div class="brand-text">
            <h1>Certificate</h1>
            <p>Issued by CONNECT4SOCIETY</p>
          </div>
        </div>
        <div class="header-badge">Verified</div>
      </div>
      <div class="certificate-area">
        <div class="certificate-box">
          <img src="certificate/certificate.png" alt="Certificate Image">
        </div>
      </div>
      <div class="footer">&copy; 2026 CONNECT4SOCIETY &bull; All rights reserved</div>
    </div>
  </div>
</body>
</html>
